<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>3D Object Transformation Viewer</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/mathjs@12.4.2/lib/browser/math.js"></script>
</head>
<body>

    <div class="container">

        <div id="mathPanel">
            <h2 id="objLabel">Cube</h2>

            <div>
                <b>Rotasi Matriks</b>
                <pre id="rotMatriks"></pre>
            </div>

            <div>
                <b>Skala Matriks</b>
                <pre id="scaleMatriks"></pre>
            </div>

            <div>
                <b>Posisi Vektor</b>
                <pre id="vectorText"></pre>
            </div>
        </div>

        <div class="controls">
            <h1>3D Transformation Viewer</h1>
        </div>

        <div id="canvas-container"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
